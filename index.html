<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <title>Financial Intelligence Agent Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full bg-slate-950 text-slate-100">
    <div class="min-h-full flex flex-col">
      <!-- Top bar -->
      <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur">
        <div class="mx-auto max-w-5xl px-4 py-3 flex items-center justify-between">
          <div class="flex items-center space-x-2">
            <div class="h-6 w-6 rounded-sm bg-emerald-400/80 shadow-lg shadow-emerald-500/40"></div>
            <div class="flex flex-col leading-tight">
              <span class="text-sm font-semibold tracking-wide text-emerald-300">
                Financial Intelligence Agent
              </span>
              <span class="text-[11px] text-slate-400 uppercase tracking-[0.16em]">
                Multi-Agent LangGraph · Gemini
              </span>
            </div>
          </div>
          <div class="text-[11px] text-slate-500">
            Demo Mode · <span class="text-emerald-400">Connected</span>
          </div>
        </div>
      </header>

      <!-- Main content -->
      <main class="flex-1">
        <div class="mx-auto max-w-5xl px-4 py-6 space-y-4">
          <!-- Controls -->
          <section
            class="rounded-xl border border-slate-800 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950/80 p-4 shadow-xl shadow-black/40"
          >
            <div class="flex flex-col md:flex-row md:items-end md:space-x-4 space-y-3 md:space-y-0">
              <div class="flex-1">
                <label
                  for="ticker-input"
                  class="block text-xs font-medium tracking-wide text-slate-400 uppercase mb-1"
                >
                  Ticker
                </label>
                <input
                  id="ticker-input"
                  type="text"
                  placeholder="e.g. PYPL"
                  class="w-full rounded-md border border-slate-700 bg-slate-900/80 px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
                />
              </div>
              <div class="w-full md:w-auto flex items-center space-x-3">
                <button
                  id="run-btn"
                  class="inline-flex items-center justify-center rounded-md bg-emerald-500/90 px-4 py-2 text-sm font-semibold text-slate-950 shadow-lg shadow-emerald-500/40 hover:bg-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-0 disabled:opacity-60 disabled:cursor-not-allowed"
                >
                  <span id="run-btn-label">Run Analysis</span>
                  <svg
                    id="spinner"
                    class="ml-2 h-4 w-4 animate-spin text-slate-900 hidden"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                  >
                    <circle
                      class="opacity-25"
                      cx="12"
                      cy="12"
                      r="10"
                      stroke="currentColor"
                      stroke-width="4"
                    ></circle>
                    <path
                      class="opacity-75"
                      fill="currentColor"
                      d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
                    ></path>
                  </svg>
                </button>
              </div>
            </div>
            <p class="mt-3 text-xs text-slate-500">
              Configure your Cloud Run URL inside this file in the
              <span class="font-mono text-[11px] text-slate-300">API_BASE_URL</span> constant.
            </p>
          </section>

          <!-- Log window -->
          <section
            class="rounded-xl border border-slate-800 bg-slate-950/90 p-4 shadow-inner shadow-black/60"
          >
            <div class="flex items-center justify-between mb-2">
              <div class="text-xs font-semibold tracking-wide text-slate-400 uppercase">
                Real-Time Agent Log
              </div>
              <button
                id="clear-btn"
                class="text-[11px] text-slate-500 hover:text-slate-200 transition-colors"
              >
                Clear
              </button>
            </div>
            <div
              id="log"
              class="mt-1 h-[420px] overflow-y-auto rounded-md border border-slate-800 bg-gradient-to-b from-slate-950 to-slate-900 font-mono text-[11px] leading-relaxed p-3 text-slate-200"
            >
              <div class="text-slate-500">
                Awaiting input. Enter a ticker above and click
                <span class="text-slate-300">Run Analysis</span>.
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>

    <script>
      // Set this to your Cloud Run base URL, e.g. "https://financial-intel-demo-xyz.a.run.app"
      const API_BASE_URL = "http://localhost:8080";

      const tickerInput = document.getElementById("ticker-input");
      const runBtn = document.getElementById("run-btn");
      const runBtnLabel = document.getElementById("run-btn-label");
      const spinner = document.getElementById("spinner");
      const logEl = document.getElementById("log");
      const clearBtn = document.getElementById("clear-btn");

      let currentSource = null;

      const nodeColors = {
        supervisor: "text-amber-300",
        researcher: "text-sky-300",
        analyst: "text-emerald-300",
      };

      function setLoading(isLoading) {
        if (isLoading) {
          runBtn.disabled = true;
          spinner.classList.remove("hidden");
          runBtnLabel.textContent = "Running…";
        } else {
          runBtn.disabled = false;
          spinner.classList.add("hidden");
          runBtnLabel.textContent = "Run Analysis";
        }
      }

      function appendLogLine(html) {
        const wrapper = document.createElement("div");
        wrapper.className = "mb-1.5";
        wrapper.innerHTML = html;
        logEl.appendChild(wrapper);
        logEl.scrollTop = logEl.scrollHeight;
      }

      function startStream() {
        const rawTicker = tickerInput.value.trim();
        if (!rawTicker) {
          tickerInput.focus();
          return;
        }
        const ticker = rawTicker.toUpperCase();

        // Close any existing stream
        if (currentSource) {
          currentSource.close();
          currentSource = null;
        }

        logEl.innerHTML = "";
        appendLogLine(
          `<span class="text-slate-500">[${new Date().toLocaleTimeString()}]</span> ` +
            `<span class="text-slate-300">Starting analysis for</span> ` +
            `<span class="text-emerald-300 font-semibold">${ticker}</span>…`
        );

        const base = API_BASE_URL.endsWith("/")
          ? API_BASE_URL.slice(0, -1)
          : API_BASE_URL;
        const url = `${base}/analyze?ticker=${encodeURIComponent(ticker)}`;

        setLoading(true);

        try {
          const es = new EventSource(url);
          currentSource = es;

          es.onmessage = (event) => {
            if (!event.data) return;
            let payload;
            try {
              payload = JSON.parse(event.data);
            } catch (err) {
              appendLogLine(
                `<span class="text-rose-400 font-semibold">[Parse Error]</span> ` +
                  `<span class="text-slate-300">${event.data}</span>`
              );
              return;
            }

            if (payload.event === "error") {
              appendLogLine(
                `<span class="text-rose-400 font-semibold">[Error]</span> ` +
                  `<span class="text-slate-300">${payload.error || "Unknown error"}</span>`
              );
              setLoading(false);
              es.close();
              currentSource = null;
              return;
            }

            if (payload.event === "end") {
              appendLogLine(
                `<span class="text-slate-500">[${new Date().toLocaleTimeString()}]</span> ` +
                  `<span class="text-emerald-300 font-semibold">[DONE]</span> ` +
                  `<span class="text-slate-300">Analysis complete for</span> ` +
                  `<span class="text-emerald-300 font-semibold">${ticker}</span>`
              );
              setLoading(false);
              es.close();
              currentSource = null;
              return;
            }

            const node = payload.node || "unknown";
            const snippet = (payload.snippet || "").replace(/\n/g, "<br>");
            const colorClass = nodeColors[node] || "text-slate-200";

            appendLogLine(
              `<span class="text-slate-500">[${new Date().toLocaleTimeString()}]</span> ` +
                `<span class="${colorClass} font-semibold">${node.toUpperCase()}</span> ` +
                `<span class="text-slate-300">›</span> ` +
                `<span class="text-slate-100">${snippet || "<span class='text-slate-500'>[no content]</span>"}</span>`
            );
          };

          es.onerror = () => {
            appendLogLine(
              `<span class="text-rose-400 font-semibold">[Connection Error]</span> ` +
                `<span class="text-slate-300">Stream interrupted.</span>`
            );
            setLoading(false);
            es.close();
            currentSource = null;
          };
        } catch (err) {
          appendLogLine(
            `<span class="text-rose-400 font-semibold">[Error]</span> ` +
              `<span class="text-slate-300">${err.message || String(err)}</span>`
          );
          setLoading(false);
        }
      }

      runBtn.addEventListener("click", startStream);

      tickerInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          startStream();
        }
      });

      clearBtn.addEventListener("click", () => {
        logEl.innerHTML = "";
      });
    </script>
  </body>
</html>
